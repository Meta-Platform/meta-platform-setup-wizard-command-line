name: Build and Release Binary

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Get version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
      # O nome do asset segue o nome do REPOSITÓRIO, não o do package.json:
      # o pacote npm chama-se `mywizard`, mas as releases publicadas e a URL de
      # download do README usam meta-platform-setup-wizard-command-line-*.
      - name: Set binary name
        run: echo "BINARY=meta-platform-setup-wizard-command-line-${{ env.VERSION }}-preview-linux-x64" >> $GITHUB_ENV
      - name: Build binary with pkg
        run: npx pkg ./src/Executables/mywizard.js --targets node22-linux-x64 --output ${{ env.BINARY }}
      - name: Create tag
        run: |
          git config --global user.email "kadisk.shark@gmail.com"
          git config --global user.name "Kaio Cezar"
          git fetch --tags
          if ! git rev-parse ${{ env.VERSION }} >/dev/null 2>&1; then
            git tag -a ${{ env.VERSION }} -m "Release ${{ env.VERSION }}"
            git push origin ${{ env.VERSION }}
          else
            echo "Tag ${{ env.VERSION }} already exists."
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BINARY }}
          tag_name: ${{ env.VERSION }}
